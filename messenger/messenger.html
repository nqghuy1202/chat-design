<!-- ============================================================
     MESSENGER FULLSCREEN — HTML Shell
     Paste vào Static Content Region trên APEX page
     ============================================================ -->
<div id="ms-root">

  <!-- ── Left Panel ── -->
  <div id="ms-left">
    <div id="ms-lp-track">

      <!-- ── S1: Danh sách hội thoại ── -->
      <div id="ms-lp-s1">

        <!-- App header -->
        <div id="ms-lp-app-header">
          <div style="display:flex;align-items:center;gap:10px">
            <div id="ms-app-logo">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="white">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <span style="font-weight:600;font-size:14px;color:#0F172A">Tin nhắn</span>
          </div>
          <button type="button" id="ms-compose-btn" title="Soạn tin nhắn mới" onclick="msOpenNewConv()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
        </div>

        <!-- Scope segmented: chi hien khi modal duoc mo tu 1 chung tu (entryDoc) -->
        <div id="ms-scope-box">
          <div id="ms-scope-doc-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1D4ED8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span id="ms-scope-doc-text"></span>
          </div>
          <div class="ms-scope-seg">
            <button type="button" id="ms-seg-doc" class="active" onclick="msSetScope('DOC')">Chứng từ này<span class="ms-seg-count" id="ms-seg-doc-count"></span></button>
            <button type="button" id="ms-seg-all" onclick="msSetScope('ALL')">Tất cả</button>
          </div>
        </div>

        <!-- Search + Filter -->
        <div id="ms-lp-header">
          <div class="ms-search-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="ms-conv-search" placeholder="Tìm kiếm...">
          </div>
          <div id="ms-filter-row">
            <div class="ms-filter-select" id="ms-type-select">
              <button type="button" class="ms-filter-chip active ms-filter-select-trigger" id="ms-type-trigger" onclick="msToggleTypeMenu(event)">
                <span id="ms-type-trigger-label">Tất cả</span>
                <svg class="caret" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="ms-filter-menu" id="ms-type-menu">
                <button type="button" class="ms-filter-menu-item selected" data-filter="ALL" onclick="msSelectTypeFilter(this)">
                  <span>Tất cả</span>
                  <svg class="check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
                <button type="button" class="ms-filter-menu-item" data-filter="DM" onclick="msSelectTypeFilter(this)">
                  <span>Cá nhân</span>
                  <svg class="check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
                <button type="button" class="ms-filter-menu-item" data-filter="GROUP" onclick="msSelectTypeFilter(this)">
                  <span>Nhóm</span>
                  <svg class="check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
                <button type="button" class="ms-filter-menu-item" data-filter="DOC" onclick="msSelectTypeFilter(this)">
                  <span>Chứng từ</span>
                  <svg class="check" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
              </div>
            </div>
            <button type="button" class="ms-filter-chip ms-filter-unread" id="ms-unread-toggle" onclick="msToggleUnreadFilter()">
              <span class="dot"></span>
              <span>Chưa đọc</span>
            </button>
          </div>
        </div>

        <!-- Conversation list -->
        <div id="ms-conv-list"></div>

        <!-- User footer -->
        <div id="ms-user-row">
          <div id="ms-user-avatar"></div>
          <div id="ms-user-info">
            <span id="ms-user-name">Đang tải...</span>
            <span id="ms-user-status-label" style="font-size:11px;color:#94A3B8;display:block;margin-top:1px"></span>
          </div>
        </div>

      </div><!-- /ms-lp-s1 -->

      <!-- ── S2: Soạn tin nhắn mới (recipient hợp nhất — DM + nhóm) ── -->
      <div id="ms-lp-s2">

        <!-- Header -->
        <div class="ms-lp-sh">
          <button type="button" class="ms-lp-back-btn" onclick="msComposeClose()" title="Đóng">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <span class="ms-lp-sh-title">Tin nhắn mới</span>
        </div>

        <!-- Recipient field: "Tới:" + chips + ô tìm gộp chung -->
        <div class="ms-compose-recip-wrap">
          <div id="ms-compose-recip" class="ms-compose-recip">
            <span class="ms-compose-to-label">Tới:</span>
            <span id="ms-s2-chips" class="ms-compose-chips"></span>
            <input type="text" id="ms-s2-search" class="ms-compose-input" placeholder="Tìm theo tên..." autocomplete="off" oninput="msS2Search(this.value)">
          </div>
        </div>

        <!-- Tên nhóm: tùy chọn, reveal khi ≥2 người -->
        <div id="ms-compose-name-wrap" class="ms-compose-name-wrap">
          <input type="text" id="ms-group-name" class="ms-s3-name-input" placeholder="Tên nhóm (tùy chọn)..." oninput="msUpdateComposeBtn()">
        </div>

        <!-- Contact list -->
        <div id="ms-s2-contacts" class="ms-lp-list-wrap"></div>

        <!-- Footer: nút chính động (Nhắn tin / Tạo nhóm) -->
        <div class="ms-lp-sf">
          <button type="button" id="ms-compose-action" class="ms-lp-create-btn" disabled onclick="msComposeSubmit()">
            Nhắn tin
          </button>
        </div>

      </div><!-- /ms-lp-s2 -->

    </div><!-- /ms-lp-track -->
  </div><!-- /#ms-left -->


  <!-- ── Center Panel ── -->
  <div id="ms-center">

    <!-- Empty state -->
    <div id="ms-no-conv">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Chọn hội thoại để bắt đầu</p>
    </div>

    <!-- Chat header -->
    <div id="ms-chat-header">
      <div id="ms-chat-header-av"></div>
      <div id="ms-chat-header-info">
        <span id="ms-chat-header-name"></span>
        <span id="ms-chat-header-sub"></span>
      </div>
      <div id="ms-chat-header-actions">
        <button type="button" id="ms-header-search-btn" title="Tìm kiếm tin nhắn" onclick="msToggleConvSearch()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button type="button" id="ms-toggle-info-btn" title="Thông tin hội thoại">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Banner tin ghim -->
    <div id="ms-pin-banner">
      <div class="ms-pin-banner-row" onclick="msTogglePinList()">
        <div class="ms-pin-accent"></div>
        <div class="ms-pin-banner-main">
          <div class="ms-pin-banner-label">Tin ghim</div>
          <div class="ms-pin-banner-text" id="ms-pin-banner-text"></div>
        </div>
        <span class="ms-pin-banner-count" id="ms-pin-banner-count"></span>
        <button type="button" class="ms-pin-banner-toggle" title="Xem tin đã ghim">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div id="ms-pin-list"></div>
    </div>

    <!-- Banner: tin moi o hoi thoai khac (khi dang scope theo chung tu) -->
    <div id="ms-crossdoc-banner">
      <div class="ms-cd-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="ms-cd-text" id="ms-crossdoc-text"></div>
      <button type="button" class="ms-cd-view" onclick="msViewCrossDoc()">Xem</button>
      <button type="button" class="ms-cd-dismiss" onclick="msCloseCrossDocBanner()" title="Bỏ qua">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Tìm kiếm tin nhắn trong hội thoại (mở từ icon kính lúp ở chat header) -->
    <div id="ms-msgsearch" style="display:none;">
      <div class="ms-cs-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="ms-cs-input" placeholder="Tìm trong hội thoại..." autocomplete="off" oninput="msConvSearchInput(this.value)" onkeydown="if(event.key==='Escape')msCloseConvSearch()">
        <button type="button" id="ms-cs-close" onclick="msCloseConvSearch()" title="Đóng">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="ms-cs-results"></div>
    </div>

    <!-- Messages -->
    <div id="ms-messages"></div>
    <div id="ms-typing-indicator" style="display:none;"></div>

    <!-- Input area -->
    <div id="ms-input-area">
      <div id="ms-reply-preview">
        <div id="ms-reply-bar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
            <polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
          </svg>
          <div style="flex:1;min-width:0">
            <span id="ms-reply-name"></span>
            <span id="ms-reply-body"></span>
          </div>
          <button type="button" id="ms-reply-cancel-btn" onclick="msCancelReply()" title="Hủy trả lời">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="ms-input-box">
        <div id="ms-file-preview-bar" class="ms-file-preview-bar"></div>
        <div id="ms-fmt-toolbar" class="ms-fmt-toolbar">
          <button type="button" class="ms-tb-btn" title="Đậm"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
          <button type="button" class="ms-tb-btn" title="Nghiêng"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
          <button type="button" class="ms-tb-btn" title="Code"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
          <div class="ms-tb-sep"></div>
          <button type="button" class="ms-tb-btn" title="Liên kết"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
          <button type="button" class="ms-tb-btn" title="Danh sách"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
        </div>
        <div id="ms-chat-input" contenteditable="true" data-placeholder="Nhập tin nhắn..."></div>
        <div id="ms-input-row">
          <div class="ms-attach-menu-wrap">
            <button type="button" class="ms-tb-btn" title="Đính kèm ảnh, video, tệp tin" onclick="msTriggerFileUpload()">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
          </div>
          <div class="ms-input-row-right">
            <div class="ms-emoji-picker-wrap">
              <button type="button" class="ms-tb-btn" title="Emoji" onclick="msToggleEmojiPicker(event)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
              </button>
              <div id="ms-emoji-picker" class="ms-emoji-picker">
                <input class="ms-emoji-search-input" id="ms-emoji-search-inp" type="text" placeholder="Tìm emoji..." oninput="msFilterEmoji(this.value)">
                <div id="ms-emoji-grid-wrap"></div>
              </div>
            </div>
            <button type="button" id="ms-send-btn" onclick="msSendMessage()" title="Gửi (Enter)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /#ms-center -->


  <!-- ── Right Panel (info) ── -->
  <div id="ms-right">
    <div id="ms-right-header">
      <span>Thông tin</span>
      <button type="button" id="ms-close-info-btn" onclick="msToggleInfo()" title="Đóng">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="ms-info-content"></div>
  </div>

  <!-- ── Context menu hội thoại (dot-menu) ── -->
  <div id="ms-conv-menu" class="ms-conv-menu"></div>

  <!-- ── Thanh quick-react 6 emoji (floating) ── -->
  <div id="ms-react-bar" class="ms-react-bar"></div>

  <!-- ── Modal chuyển tiếp ── -->
  <div id="ms-forward-modal" onclick="msCloseForward(event)">
    <div class="ms-fwd-card">
      <div class="ms-fwd-head">
        <div class="ms-fwd-title">Chuyển tiếp tin nhắn</div>
        <div class="ms-fwd-quote" id="ms-fwd-quote"></div>
      </div>
      <input type="text" class="ms-fwd-search" id="ms-fwd-search" placeholder="Tìm hội thoại..." oninput="msForwardSearch(this.value)">
      <div id="ms-fwd-list"></div>
      <div class="ms-fwd-foot">
        <button type="button" class="ms-fwd-btn cancel" onclick="msCloseForward()">Hủy</button>
        <button type="button" class="ms-fwd-btn send" id="ms-fwd-send" onclick="msSendForward()">Chuyển tiếp</button>
      </div>
    </div>
  </div>

</div><!-- /#ms-root -->
